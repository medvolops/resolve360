<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resolve360</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#0f172a;--sb2:#1e293b;--sbt:#94a3b8;--sbh:#f1f5f9;--sba:rgba(99,102,241,.18);--sbac:#a5b4fc;
  --p:#6366f1;--pd:#4f46e5;--pl:#eef2ff;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--g900:#0f172a;
  --red:#ef4444;--redl:#fef2f2;--amber:#f59e0b;--amberl:#fffbeb;
  --green:#10b981;--greenl:#ecfdf5;--orange:#f97316;--orangel:#fff7ed;--violet:#8b5cf6;--violetl:#f5f3ff;
  --r:7px;--sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05)
}
body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g100);color:var(--g800);min-height:100vh;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
a{cursor:pointer}

/* 360 PULSE */
@keyframes pulse360{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.15)}}
.s360{display:inline-block;animation:pulse360 2.2s ease-in-out infinite;color:#fbbf24;font-style:italic;letter-spacing:-.01em}
.brand-360{display:inline-block;animation:pulse360 2.2s ease-in-out infinite;color:#fbbf24;font-style:italic;font-size:inherit}
/* THEME SWATCHES */
.th-sw{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .15s,box-shadow .15s;flex-shrink:0}
.th-sw:hover{transform:scale(1.15)}.th-sw.active{box-shadow:0 0 0 3px #fff,0 0 0 5px var(--p)}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  background:url('bg.jpg') center/cover no-repeat,linear-gradient(135deg,#1a3a1a 0%,#4a7c0a 40%,#1e3a8a 100%)}
#login::before{content:'';position:absolute;inset:0;background:rgba(10,20,10,.42);backdrop-filter:blur(1px)}
.lcard{background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border-radius:16px;padding:44px 40px;width:420px;box-shadow:0 24px 48px rgba(0,0,0,.35);position:relative;z-index:1}
.llogo{text-align:center;margin-bottom:28px}.llogo .ico{font-size:38px;display:block;margin-bottom:8px}
.llogo h1{font-size:36px;font-weight:900;letter-spacing:-.03em;line-height:1}
.resolve-word{background:linear-gradient(135deg,#bfdbfe 0%,#60a5fa 40%,#2563eb 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.llogo p{font-size:13px;margin-top:8px;font-weight:700;letter-spacing:.04em;background:linear-gradient(90deg,#e11d48,#f97316,#eab308,#16a34a,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.04em}
.fg input,.inp{padding:9px 13px;border:1.5px solid var(--g200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;transition:border .15s,box-shadow .15s}
.fg input:focus,.inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.mobile-wrap{display:flex;gap:8px}
.country{padding:9px 11px;border:1.5px solid var(--g200);border-radius:var(--r);font-size:13px;background:#fff;outline:none}
.lbtn{width:100%;padding:11px;background:var(--p);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;margin-top:8px;letter-spacing:.02em;transition:background .15s}
.lbtn:hover{background:var(--pd)}
.forgot{text-align:right;margin-top:-6px;margin-bottom:10px}.forgot a{font-size:12px;color:var(--p)}
.lerr{background:var(--redl);color:var(--red);padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:10px;display:none}
.lmsg{background:var(--greenl);color:var(--green);padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:10px;display:none}
#forgot-form{display:none}

/* APP SHELL */
#app{display:none;min-height:100vh;flex-direction:column}#app.v{display:flex}
.topbar{background:#fff;border-bottom:1px solid var(--g200);height:54px;display:flex;align-items:center;padding:0 18px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.topbar-brand{font-size:15px;font-weight:800;color:var(--p);letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tbprofile{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.tbprofile:hover{background:var(--g100)}
.tbname{font-size:13px;font-weight:600;color:var(--g700)}
.layout{flex:1;min-height:0;position:relative;display:block}

/* SIDEBAR — always absolute, 54px rail, hover/pin to 220px */
.sidebar{
  position:absolute;left:0;top:0;bottom:0;
  background:var(--sb);display:flex;flex-direction:column;
  z-index:150;width:54px;overflow:hidden;
  transition:width .22s cubic-bezier(.4,0,.2,1);
  padding:10px 4px 20px;
}
.sidebar:hover,.sidebar.pinned{width:220px;overflow-y:auto;padding:10px 8px 20px}
.sidebar:not(.pinned):hover{box-shadow:6px 0 28px rgba(0,0,0,.3)}
/* Main always offset 54px; extra when sidebar pinned */
.main{position:absolute;left:54px;right:0;top:0;bottom:0;overflow-y:auto;padding:22px;transition:left .22s cubic-bezier(.4,0,.2,1)}
.layout.sb-open>.main{left:220px}
/* Hide text in rail unless hovering */
.sidebar:not(.pinned):not(:hover) .ni-txt,
.sidebar:not(.pinned):not(:hover) .s-raise-txt,
.sidebar:not(.pinned):not(:hover) .s-hdr-lbl,
.sidebar:not(.pinned):not(:hover) .s-hdr-arrow,
.sidebar:not(.pinned):not(:hover) .nb{opacity:0}
.ni-txt,.s-raise-txt,.s-hdr-lbl,.s-hdr-arrow,.nb{transition:opacity .18s}
/* Pin toggle */
.sb-toggle{display:flex;justify-content:flex-end;padding:2px 2px 8px;flex-shrink:0}
.sb-toggle-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;background:rgba(255,255,255,.07);color:var(--sbt);font-size:12px;cursor:pointer;transition:background .12s;white-space:nowrap}
.sb-toggle-btn:hover{background:rgba(255,255,255,.16);color:var(--sbh)}

.s-section{}
.s-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 4px;cursor:pointer;user-select:none;white-space:nowrap}
.s-hdr-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g500)}
.s-hdr-arrow{font-size:10px;color:var(--g500);transition:transform .2s}
.s-hdr-arrow.open{transform:rotate(90deg)}
.s-items{overflow:hidden;transition:max-height .22s ease}
.ni{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;font-size:13px;font-weight:500;color:var(--sbt);margin-bottom:1px;cursor:pointer;transition:all .12s;white-space:nowrap;overflow:hidden}
.ni:hover{background:rgba(255,255,255,.07);color:var(--sbh)}
.ni.active{background:var(--sba);color:var(--sbac);font-weight:600}
.ni .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ni .nb{margin-left:auto;background:rgba(239,68,68,.85);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:999px;min-width:16px;text-align:center;flex-shrink:0}
.s-raise{background:var(--p);color:#fff;margin:8px 6px 4px;padding:9px 10px;border-radius:var(--r);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap;overflow:hidden}
.s-raise:hover{background:var(--pd)}

/* MAIN — see layout above */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.ptitle{font-size:18px;font-weight:800;color:var(--g900);letter-spacing:-.01em}.psub{font-size:12px;color:var(--g400);margin-top:3px}

/* CARDS */
.stats{display:grid;gap:12px;margin-bottom:18px}
.sc{background:#fff;border-radius:10px;padding:17px 20px;cursor:pointer;transition:all .18s;border:1px solid var(--g200);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.sc:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08)}
.sc .slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.sc .sval{font-size:28px;font-weight:900;margin:5px 0 3px;line-height:1}
.sc .sdesc{font-size:11px;color:var(--g400)}
.sc.red   {background:#fff8f8;border-color:#fecaca}.sc.red    .slabel{color:#f87171}.sc.red    .sval{color:#ef4444}
.sc.amber {background:#fffdf5;border-color:#fde68a}.sc.amber  .slabel{color:#fbbf24}.sc.amber  .sval{color:#d97706}
.sc.green {background:#f5fff9;border-color:#a7f3d0}.sc.green  .slabel{color:#34d399}.sc.green  .sval{color:#10b981}
.sc.blue  {background:#f8f7ff;border-color:#c7d2fe}.sc.blue   .slabel{color:#818cf8}.sc.blue   .sval{color:#6366f1}
.sc.orange{background:#fff9f5;border-color:#fed7aa}.sc.orange .slabel{color:#fb923c}.sc.orange .sval{color:#f97316}
.sc.violet{background:#faf8ff;border-color:#ddd6fe}.sc.violet .slabel{color:#a78bfa}.sc.violet .sval{color:#8b5cf6}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s;letter-spacing:.01em}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-o{background:#fff;color:var(--g700);border:1px solid var(--g200)}.btn-o:hover{background:var(--g50)}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:#059669}
.btn-r{background:var(--red);color:#fff}.btn-r:hover{background:#dc2626}
.btn-y{background:var(--amber);color:#fff}.btn-y:hover{background:#d97706}
.btn-sm{padding:5px 10px;font-size:12px}

/* CARD / TABLE */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--g200);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.ch{padding:13px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:13px;font-weight:700;color:var(--g800)}.cb{padding:16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);padding:9px 13px;background:var(--g50);border-bottom:1px solid var(--g200)}
td{padding:10px 13px;font-size:13px;color:var(--g700);border-bottom:1px solid var(--g100);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--g50)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.b-pending{background:#fef3c7;color:#92400e}.b-processing{background:#dbeafe;color:#1e40af}
.b-onhold{background:#ede9fe;color:#5b21b6}.b-closed{background:#d1fae5;color:#065f46}
.b-urgent{background:#fee2e2;color:#991b1b}.b-high{background:#ffedd5;color:#9a3412}
.b-medium{background:#fef9c3;color:#854d0e}.b-low{background:#f0fdf4;color:#166534}

/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.mo.open{display:flex}
.md{background:#fff;border-radius:12px;width:640px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 48px rgba(0,0,0,.18)}
.mh{padding:16px 20px 13px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:15px;font-weight:700;color:var(--g900)}.mc2{font-size:18px;background:none;border:none;color:var(--g400);padding:3px 6px;border-radius:4px;line-height:1}
.mc2:hover{background:var(--g100)}.mb{padding:20px}.mf{padding:13px 20px;border-top:1px solid var(--g100);display:flex;gap:8px;justify-content:flex-end}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgroup{display:flex;flex-direction:column;gap:4px}.fgroup.full{grid-column:1/-1}
.fgroup label{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.04em}
.fgroup input,.fgroup select,.fgroup textarea{padding:9px 12px;border:1.5px solid var(--g200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.fgroup textarea{resize:vertical;min-height:76px}

/* FILTER BAR */
.fbar{display:flex;flex-wrap:wrap;gap:7px;padding:10px 12px;background:#fff;border:1px solid var(--g200);border-radius:var(--r);margin-bottom:14px;align-items:center}

/* SEARCHABLE SELECT */
.ss-wrap{position:relative;display:inline-block}
.ss-inp{font-size:12px;padding:6px 10px;border:1.5px solid var(--g200);border-radius:var(--r);outline:none;width:150px;transition:border .15s;cursor:pointer;background:#fff}
.ss-inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.ss-drop{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--g200);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:600;min-width:180px;max-height:220px;overflow-y:auto;display:none}
.ss-drop.open{display:block}
.ss-opt{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--g700);transition:background .1s}
.ss-opt:hover,.ss-opt.selected{background:var(--pl);color:var(--p)}

/* ACTIVITY */
.act{display:flex;flex-direction:column}
.ai{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--g100);font-size:13px}
.ai:last-child{border-bottom:none}.ai-text{flex:1;color:var(--g700);line-height:1.5}
.ai-text strong{color:var(--g900)}.ai-time{font-size:11px;color:var(--g400);margin-top:2px}
.dr{display:flex;gap:8px;margin-bottom:10px;font-size:13px}
.dl{font-weight:600;color:var(--g400);width:110px;flex-shrink:0;font-size:12px}.dv{color:var(--g800);flex:1}

/* STEPPER */
.stepper{display:flex;margin-bottom:18px}
.stp{flex:1;text-align:center;padding:6px;font-size:11px;font-weight:600;color:var(--g400);border-bottom:3px solid var(--g200);transition:all .2s}
.stp.done{color:var(--green);border-bottom-color:var(--green)}.stp.act2{color:var(--p);border-bottom-color:var(--p)}

/* REPORTS */
.rpt-filters{display:flex;flex-wrap:wrap;gap:8px;padding:14px;background:#fff;border:1px solid var(--g200);border-radius:var(--r);margin-bottom:16px}
.chart-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.chart-box{background:#fff;border-radius:var(--r);border:1px solid var(--g200);padding:14px;box-shadow:var(--sh)}
.chart-box h3{font-size:11px;font-weight:700;color:var(--g500);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}

/* MISC */
.idc{font-family:'SF Mono','Fira Code',monospace;font-size:11px;font-weight:700;background:var(--pl);color:var(--p);padding:2px 7px;border-radius:4px;cursor:pointer;white-space:nowrap}
.idc:hover{background:#c7d2fe}
.sdiv{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--g200)}
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:2px solid var(--g200)}
.tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--g500);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--p);border-bottom-color:var(--p)}
.empty{text-align:center;padding:46px 20px;color:var(--g400)}
.empty .ei{font-size:38px;margin-bottom:8px}.empty .em{font-size:13px;font-weight:600;color:var(--g500)}
.rmk-box{background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:13px;margin-top:13px}
.rmk-box label{font-size:11px;font-weight:700;color:var(--g500);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.rmk-ta{width:100%;padding:9px 12px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:inherit;font-size:13px;outline:none;min-height:66px;resize:vertical}
.rmk-ta:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.pgr{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--g100)}
.overdue{color:var(--red);font-weight:600}.due-soon{color:var(--orange);font-weight:500}
.bell-btn{position:relative;background:none;border:none;font-size:18px;padding:5px 7px;border-radius:6px;color:var(--g500)}
.bell-btn:hover{background:var(--g100)}
.bell-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid #fff}
.av-img{border-radius:50%;object-fit:cover}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.tm{background:#fff;border-radius:var(--r);border:1px solid var(--g200);padding:14px;box-shadow:var(--sh);text-align:center}
.tm .tname{font-size:13px;font-weight:700;margin-top:7px}.tm .trole{font-size:11px;color:var(--g400)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--g900);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;display:none;align-items:center;gap:8px;max-width:300px;animation:su .2s ease}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <div class="llogo"><h1><span class="resolve-word">Resolve</span> <span class="s360">360</span></h1><p>MedVol Escalation Tracker</p></div>
    <div id="lerr" class="lerr"></div><div id="lmsg" class="lmsg"></div>
    <div id="login-form">
      <div class="fg"><label>Mobile</label>
        <input type="tel" id="l-mobile" class="inp" placeholder="Enter mobile number" maxlength="10" style="width:100%"></div>
      <div class="fg"><label>Password</label><input type="password" id="l-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="forgot"><a onclick="showForgot()">Forgot password?</a></div>
      <button class="lbtn" onclick="doLogin()">Sign In →</button>
    </div>
    <div id="forgot-form">
      <p style="font-size:13px;color:var(--g500);margin-bottom:14px">Enter your registered mobile to reset password.</p>
      <div class="fg"><label>Mobile</label><input type="tel" id="f-mobile" placeholder="Mobile" maxlength="10"></div>
      <div class="fg" id="f-np-w" style="display:none"><label>New Password</label><input type="password" id="f-newpass" placeholder="New password"></div>
      <div class="fg" id="f-cp-w" style="display:none"><label>Confirm Password</label><input type="password" id="f-confirm" placeholder="Confirm"></div>
      <button class="lbtn" id="f-btn" onclick="handleForgot()">Verify →</button>
      <p style="text-align:center;margin-top:12px"><a onclick="showLogin()" style="font-size:13px;color:var(--p)">← Back</a></p>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand" style="font-size:17px">Resolve <span class="brand-360">360</span></div>
    <div class="topbar-right">
      <input id="esc-s" class="ss-inp" placeholder="🔍 Search ESC-ID…" style="width:160px;font-size:12px" onkeydown="if(event.key==='Enter')searchEsc(this.value)">
      <button class="bell-btn" onclick="showNotifs()">🔔<span class="bell-dot" id="bdot" style="display:none"></span></button>
      <div class="tbprofile" onclick="openProfile()">
        <div id="t-av"></div>
        <div class="tbname" id="t-name"></div>
      </div>
      <button class="btn btn-o btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<!-- Raise Modal -->

function submitComment(id){

// ── ACTIONS ──
function saveEditMeta(id){
  const pri=document.getElementById('ep')?.value,due=document.getElementById('ed')?.value;
  const es=DB.escs(),e=es.find(x=>x.id===id);if(!e)return;
  if(!['pending','processing'].includes(e.status)){showToast('Cannot edit in this status','⚠️');return}
  const ch=[];if(pri&&pri!==e.priority){ch.push(`Priority: ${e.priority}→${pri}`);e.priority=pri}if(due&&new Date(due).toISOString()!==e.due){ch.push('Due date updated');e.due=new Date(due).toISOString()}
  if(!ch.length){showToast('No changes','⚠️');return}
  e.updatedAt=new Date().toISOString();e.activity.push({user:CU.id,text:`Edited: ${ch.join(', ')}`,time:new Date().toISOString()});
  DB.saveE(es);closeM('m-detail');showToast('Saved ✓');bcast('r');navigate(CP);
}
function updateStatus(id,ns,rmk){
  const es=DB.escs(),e=es.find(x=>x.id===id);if(!e)return;
  const lbl={pending:'Pending',processing:'Processing',onhold:'On Hold',closed:'Closed'};
  e.status=ns;e.updatedAt=new Date().toISOString();e.activity.push({user:CU.id,text:`Status → ${lbl[ns]}${rmk?`. Remarks: "${rmk}"`:'.'}`,time:new Date().toISOString()});
  DB.saveE(es);addNotif(e.raisedBy,id,`${CU.name} changed ${id} → ${lbl[ns]}${rmk?': "'+rmk+'"':''}`, 'my');
  closeM('m-detail');showToast(`→ ${lbl[ns]}`);bcast('r');bcast('n');navigate(CP);buildSidebar();
}
function resolveEsc(id,rmk){
  if(!rmk){showToast('Resolution remarks required','⚠️');return}
  const es=DB.escs(),e=es.find(x=>x.id===id);if(!e)return;
  e.status='closed';e.remarks=rmk;e.updatedAt=new Date().toISOString();e.activity.push({user:CU.id,text:`Closed. Remarks: "${rmk}"`,time:new Date().toISOString()});
  DB.saveE(es);addNotif(e.raisedBy,id,`${CU.name} closed ${id}: "${rmk}"`,'my');
  closeM('m-detail');showToast(`${id} closed 🎉`);bcast('r');bcast('n');navigate(CP);buildSidebar();
}
function escalateEsc(id,rmk){
  const es=DB.escs(),e=es.find(x=>x.id===id);if(!e)return;
  const targetRoles=myAcc()===1?['account_manager','tl']:['manager','admin'];
  const tgt=DB.users().find(u=>targetRoles.includes(u.role)&&uTeams(u).some(t=>uTeams(getU(e.assignedTo)).includes(t)))||DB.users().find(u=>targetRoles.includes(u.role));
  if(!tgt){showToast('No target found','⚠️');return}
  const pt=e.passedThrough||[];if(!pt.includes(e.assignedTo))pt.push(e.assignedTo);
  e.assignedTo=tgt.id;e.passedThrough=pt;e.status='pending';e.updatedAt=new Date().toISOString();
  e.activity.push({user:CU.id,text:`Escalated → ${tgt.name}. Status → Pending.${rmk?' Remarks: "'+rmk+'"':''}`,time:new Date().toISOString()});
  DB.saveE(es);addNotif(tgt.id,id,`${CU.name} escalated ${id} to you [${e.priority}]`,'in');addNotif(e.raisedBy,id,`${id} escalated to ${tgt.name}`,'my');
  closeM('m-detail');showToast(`Escalated to ${tgt.name}`);bcast('r');bcast('n');navigate(CP);buildSidebar();
}
function doReassign(id,rmk){
  const sel=document.getElementById('reassign-sel')?.value;if(!sel){showToast('Select a person','⚠️');return}
  const es=DB.escs(),e=es.find(x=>x.id===id);if(!e)return;
  const oldNm=getU(e.assignedTo).name,nU=getU(sel);
  const pt=e.passedThrough||[];if(!pt.includes(e.assignedTo))pt.push(e.assignedTo);
  e.assignedTo=sel;e.passedThrough=pt;e.status='pending';e.updatedAt=new Date().toISOString();
  e.activity.push({user:CU.id,text:`Reassigned ${oldNm} → ${nU.name}. Status → Pending.${rmk?' Remarks: "'+rmk+'"':''}`,time:new Date().toISOString()});
  DB.saveE(es);addNotif(sel,id,`${CU.name} reassigned ${id} to you${rmk?': "'+rmk+'"':''}`,'in');if(e.raisedBy!==CU.id)addNotif(e.raisedBy,id,`${id} reassigned to ${nU.name}`,'my');
  closeM('m-detail');showToast(`Reassigned to ${nU.name}`);bcast('r');bcast('n');navigate(CP);buildSidebar();
}

function applyRF(list){
  return list.filter(e=>{
    if(RF.from&&new Date(e.createdAt)<new Date(RF.from))return false;
    if(RF.to&&new Date(e.createdAt)>new Date(RF.to+'T23:59:59'))return false;
    if(RF.st&&e.status!==RF.st)return false;
    if(RF.pri&&e.priority!==RF.pri)return false;
    if(RF.cat&&e.category!==RF.cat)return false;
    if(RF.uid&&e.raisedBy!==RF.uid&&e.assignedTo!==RF.uid)return false;
    if(RF.team&&!uTeams(getU(e.raisedBy)).includes(RF.team)&&!uTeams(getU(e.assignedTo)).includes(RF.team))return false;
    return true;
  });
}
function initCharts(){
  const es=applyRF(DB.escs());

  const mkD=(id,labels,data)=>{const el=document.getElementById(id);if(!el)return;if(el._ch)el._ch.destroy();el._ch=new Chart(el,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:clrs,borderWidth:2}]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}})};
  mkD('c-status',['Pending','Processing','On Hold','Closed'],['pending','processing','onhold','closed'].map(s=>es.filter(e=>e.status===s).length));
  mkBar('c-priority',['Urgent','High','Med','Low'],['Urgent','High','Medium','Low'].map(p=>es.filter(e=>e.priority===p).length),['#ef4444','#f97316','#f59e0b','#10b981']);
  const cats=[...new Set(es.map(e=>e.category).filter(Boolean))];mkBar('c-category',cats.map(c=>c.split(' ')[0]),cats.map(c=>es.filter(e=>e.category===c).length));
  const teams=[...new Set(DB.users().flatMap(u=>uTeams(u)))];mkBar('c-teams',teams,teams.map(t=>es.filter(e=>uTeams(getU(e.raisedBy)).includes(t)).length));

    const asgn=applyRF(DB.escs().filter(e=>e.assignedTo===u.id));const cl=asgn.filter(e=>e.status==='closed');
    const tats=cl.map(e=>{const ca=[...e.activity].reverse().find(a=>a.text.startsWith('Closed'));return ca?Math.round((new Date(ca.time)-new Date(e.createdAt))/3600000):null}).filter(t=>t!==null);
    const avg=tats.length?(tats.reduce((a,b)=>a+b,0)/tats.length).toFixed(1):'—';

  }).join('');

}

async function importUsersCSV(input){
  const file=input.files[0];if(!file)return;
  input.value='';
  // Show a persistent status panel
  const showStatus=(msg,err)=>{
    let d=document.getElementById('imp-status');
    if(!d){d=document.createElement('div');d.id='imp-status';d.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;padding:14px 22px;border-radius:10px;font-size:13px;z-index:9999;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.4)';document.body.appendChild(d)}
    d.style.borderLeft=err?'4px solid #ef4444':'4px solid #10b981';
    d.innerHTML=msg;
    if(!err)return;
    // Add close button for errors
    const btn=document.createElement('button');btn.textContent='Close';btn.style.cssText='display:block;margin-top:10px;background:#ef4444;color:#fff;border:none;padding:6px 14px;border-radius:5px;cursor:pointer;font-size:12px';
    btn.onclick=()=>d.remove();d.appendChild(btn);
  };
  const closeStatus=()=>{const d=document.getElementById('imp-status');if(d)d.remove()};

  showStatus('📂 Reading file…');
  try{
    // Parse CSV with native JS (most reliable)
    const text=await file.text();
    const lines=text.split('\n').map(l=>l.replace(/\r/g,'').trim()).filter(l=>l);
    if(lines.length<2){showStatus('❌ File is empty or has no data rows',true);return}

    // Parse headers
    const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());
    showStatus(`📋 Found ${lines.length-1} rows, ${headers.length} columns…`);

    // Find column indices by partial match
    const col=(...needles)=>{for(const n of needles){const i=headers.findIndex(h=>h.includes(n));if(i>=0)return i}return -1};
    const iName=col('name'),iNick=col('nick'),iMob=col('mobile'),iRole=col('role'),iTeam=col('team'),iPass=col('pass'),iRto=col('reportsto','reports to');

    if(iName<0||iMob<0){showStatus(`❌ Cannot find Name or Mobile columns.\nHeaders found: ${headers.join(' | ')}`,true);return}

    const existing=DB.users();
    const newUsers=[],errors=[];

    lines.slice(1).forEach((line,i)=>{
      const cols=line.split(',');
      const g=idx=>idx>=0?(cols[idx]||'').trim():'';
      const name=g(iName);
      const nick=g(iNick);
      let mob=g(iMob).replace(/\D/g,'');
      if(mob.length===12&&mob.startsWith('91'))mob=mob.slice(2);
      if(mob.length===11&&mob.startsWith('0'))mob=mob.slice(1);
      const role=(g(iRole)||'agent').toLowerCase();
      const team=g(iTeam);
      const pass=g(iPass)||'pass123';
      const rtoMob=g(iRto).replace(/\D/g,'');
      if(!name){errors.push(`Row ${i+2}: Name empty`);return}
      if(!/^\d{10}$/.test(mob)){errors.push(`Row ${i+2}: "${mob}" — not 10 digits`);return}
      if(!['agent','tl','manager','senior_mgmt'].includes(role)){errors.push(`Row ${i+2}: role "${role}" invalid`);return}
      if(existing.find(u=>u.mobile===mob)||newUsers.find(u=>u.mobile===mob)){errors.push(`Row ${i+2}: ${mob} already exists`);return}
      newUsers.push({id:'u'+Date.now()+i+Math.random().toString(36).slice(2,6),name,nick,mobile:mob,role,teams:team?[team]:[],pass,color:'#6366f1',reportsTo:'',_rtoMob:rtoMob});
    });

    if(errors.length){showImportErrors('Import Errors (fix & re-upload)',errors);closeStatus();return}
    if(!newUsers.length){showStatus('❌ No valid users found after validation',true);return}

    // Resolve reportsTo
    const allU=[...existing,...newUsers];
    newUsers.forEach(u=>{if(u._rtoMob){const m=allU.find(x=>x.mobile===u._rtoMob);if(m)u.reportsTo=m.id}delete u._rtoMob});

    showStatus(`⏳ Saving ${newUsers.length} users to database…`);

    // Insert in batches of 50
    const BATCH=50;
    for(let b=0;b<newUsers.length;b+=BATCH){
      const chunk=newUsers.slice(b,b+BATCH);
      showStatus(`⏳ Saving users ${b+1}–${Math.min(b+BATCH,newUsers.length)} of ${newUsers.length}…`);
      const {error}=await sb.from('users').insert(chunk);
      if(error){showStatus(`❌ Supabase error at row ${b+1}: ${error.message}\n\nCode: ${error.code}`,true);console.error(error);return}
    }

    // Refresh cache
    const {data}=await sb.from('users').select('*');
    C.users=data||[...existing,...newUsers];
    closeStatus();
    showToast(`✅ ${newUsers.length} users imported!`);
    navigate('admin');
  }catch(e){console.error(e);showStatus(`❌ Unexpected error: ${e.message}`,true);}
}

  const existing=document.getElementById('import-err-modal');if(existing)existing.remove();

  d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';

}

async function importCatsCSV(input){
  const file=input.files[0];if(!file)return;input.value='';
  showToast('Reading file…','⏳');
  const ab=await file.arrayBuffer();
  const wb=XLSX.read(ab);
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
  if(!rows.length){showToast('No rows','⚠️');return}
  const cats=DB.cats();
  let added=0;
  rows.forEach(r=>{

}

function pager(list,key){
  if(!PAGE[key])PAGE[key]=1;
  const total=list.length,pages=Math.ceil(total/PER),p=Math.min(PAGE[key],pages||1);
  PAGE[key]=p;
  const items=list.slice((p-1)*PER,p*PER);
  if(pages<=1)return{items,html:''};
  const btns=Array.from({length:pages},(_,i)=>`<button class="btn ${i+1===p?'btn-p':'btn-o'} btn-sm" onclick="PAGE['${key}']=${i+1};refreshView()">${i+1}</button>`).join('');
  return{items,html:`<div style="display:flex;gap:6px;align-items:center;justify-content:flex-end;padding:10px 0;flex-wrap:wrap"><span style="font-size:12px;color:var(--g400)">${total} total</span>${btns}</div>`};
}

function toggleSS(id){const d=document.getElementById(id+'_d');const open=d.style.display==='block';document.querySelectorAll('.ss-drop').forEach(x=>x.style.display='none');if(!open){d.style.display='block';d.querySelector('.ss-search')?.focus()}}
function filterSS(id,q){const list=document.getElementById(id+'_list');list.querySelectorAll('.ss-opt').forEach(o=>{o.style.display=o.textContent.toLowerCase().includes(q.toLowerCase())?'':'none'})}
function pickSS(id,ns,key,val,lbl,e){e.stopPropagation();window[ns][key]=val;document.getElementById(id+'_w').querySelector('.ss-inp').textContent=lbl;document.getElementById(id+'_d').style.display='none';PAGE={};refreshView()}
document.addEventListener('click',()=>document.querySelectorAll('.ss-drop').forEach(x=>x.style.display='none'));

// ── MODAL HELPERS ──
function openM(id){document.getElementById(id).style.display='flex'}
function closeM(id){document.getElementById(id).style.display='none'}

// ── SIDEBAR COLLAPSE ──
function toggleSec(key){
  sC[key]=!sC[key];
  const sec=document.getElementById('sec_'+key),arr=document.getElementById('arr_'+key);
  if(sec)sec.style.cssText=sC[key]?'':'max-height:0;overflow:hidden';
  if(arr)arr.classList.toggle('open',!!sC[key]);
}

// ── REFRESH ──
function refreshView(){
  if(!CU)return;
  const views={
    dashboard:renderDashboard,'pending-me':()=>renderList('pending-me'),'processing-me':()=>renderList('processing-me'),
    'onhold-me':()=>renderList('onhold-me'),'passed-me':()=>renderList('passed-me'),'raised-open':()=>renderList('raised-open'),
    'raised-all':()=>renderList('raised-all'),'team-active':()=>renderList('team-active'),'team-raised':()=>renderList('team-raised'),
    'team-pending':()=>renderList('team-pending'),closed:()=>renderList('closed'),
    'team-dashboard':renderTeamDash,'mgr-overview':renderMgrOverview,'mgr-agents':renderMgrAgents,
    reports:renderReports,admin:renderAdmin,
  };
  const fn=views[CP];
  if(fn){document.getElementById('main').innerHTML=fn();if(CP==='reports')setTimeout(initCharts,50)}
}

function navigate(page){
  CP=page;PAGE={};F={};DF={};
  refreshView();buildSidebar();
}
</script>
</body>
